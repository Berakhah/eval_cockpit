# Fly.io config for the PolyEval API service.
# Deploy: fly deploy -c fly/fly.api.toml --app polyeval-api

app = "polyeval-api"
primary_region = "ord"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "api/Dockerfile"
  build_target = "production"

[env]
  POLYEVAL_ENVIRONMENT = "prod"
  POLYEVAL_LOG_LEVEL = "INFO"
  POLYEVAL_SCHEDULER_BIND = "0.0.0.0:8000"
  OTEL_SERVICE_NAME = "polyeval-api"
  OTEL_EXPORTER_OTLP_PROTOCOL = "grpc"

[[services]]
  protocol = "tcp"
  internal_port = 8000
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
    tls_options = { alpn = ["h2", "http/1.1"] }

  [[services.ports]]
    handlers = ["http"]
    port = 80
    [services.ports.http_options]
      response.headers = { "Strict-Transport-Security" = "max-age=31536000" }

  [services.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[services.http_checks]]
    interval = "10s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[mounts]
  # No mounts needed for API — uses managed Postgres + Upstash Redis.

[metrics]
  port = 8000
  path = "/metrics"
