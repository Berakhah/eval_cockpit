# PolyEval local dev stack.
#
# Run with: `make -C polyeval dev` (from a WSL2 shell — gVisor runner integration
# in Slice 1 requires Linux-native docker).
#
# Services:
#   postgres        — primary store
#   redis           — streams + cache
#   otel-collector  — OTLP pipeline
#   prometheus      — metrics scrape
#   loki            — log aggregation
#   tempo           — trace store
#   grafana         — UI for the above (port 3000)
#   api             — FastAPI gateway, hot-reload mounted
#   scheduler       — Rust dispatcher (stub in Slice 0)
#   aggregator      — Python scorer (stub in Slice 0)
#
# Secrets are read from `infra/.env` (gitignored). Defaults are dev-only.

name: polyeval

x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  OTEL_SERVICE_NAMESPACE: polyeval

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: polyeval
      POSTGRES_PASSWORD: polyeval
      POSTGRES_DB: polyeval
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polyeval -d polyeval"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - ""
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.0
    command: ["--config=/etc/otel-collector/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otel-collector/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # collector self-metrics
      - "8889:8889"   # exposed prometheus metrics
    depends_on:
      tempo:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=24h
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 3s
      retries: 5

  loki:
    image: grafana/loki:3.3.0
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 3s
      retries: 10

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor metricsSummary
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus: { condition: service_healthy }
      loki:       { condition: service_healthy }
      tempo:      { condition: service_healthy }

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: polyeval-api
      POLYEVAL_DB_URL: postgresql+asyncpg://polyeval:polyeval@postgres:5432/polyeval
      POLYEVAL_REDIS_URL: redis://redis:6379/0
      POLYEVAL_OTEL_ENDPOINT: http://otel-collector:4317
      POLYEVAL_HMAC_SECRET: ${POLYEVAL_HMAC_SECRET:-dev-secret-please-rotate-32bytes-min}
      POLYEVAL_ENVIRONMENT: dev
      POLYEVAL_LOG_LEVEL: INFO
    volumes:
      - ../api/src:/app/src
      - ../api/tests:/app/tests
    ports:
      - "8000:8000"
    depends_on:
      postgres:       { condition: service_healthy }
      redis:          { condition: service_healthy }
      otel-collector: { condition: service_started }

  scheduler:
    build:
      context: ../scheduler
      dockerfile: Dockerfile
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: polyeval-scheduler
      POLYEVAL_REDIS_URL: redis://redis:6379/0
      POLYEVAL_SCHEDULER_BIND: 0.0.0.0:8001
      RUST_LOG: info
    ports:
      - "8001:8001"
    depends_on:
      redis:          { condition: service_healthy }
      otel-collector: { condition: service_started }

  aggregator:
    build:
      context: ../aggregator
      dockerfile: Dockerfile
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: polyeval-aggregator
      POLYEVAL_REDIS_URL: redis://redis:6379/0
      POLYEVAL_DB_URL: postgresql+asyncpg://polyeval:polyeval@postgres:5432/polyeval
    ports:
      - "8002:8002"
    depends_on:
      postgres:       { condition: service_healthy }
      redis:          { condition: service_healthy }
      otel-collector: { condition: service_started }

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:
