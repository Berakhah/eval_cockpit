# Prometheus scrape config for the local dev stack.
# Targets are docker-compose service names; scrape interval kept tight so the
# Slice 6 dashboards have fine-grained data even on 5-minute manual exercises.

global:
  scrape_interval: 5s
  scrape_timeout: 4s
  evaluation_interval: 10s
  external_labels:
    environment: dev
    cluster: polyeval-local

scrape_configs:
  - job_name: polyeval-api
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: polyeval-api

  - job_name: polyeval-scheduler
    static_configs:
      - targets: ["scheduler:8001"]
        labels:
          service: polyeval-scheduler

  - job_name: polyeval-aggregator
    static_configs:
      - targets: ["aggregator:8002"]
        labels:
          service: polyeval-aggregator

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          service: otel-collector

  - job_name: prometheus-self
    static_configs:
      - targets: ["localhost:9090"]
